<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attendance Portal</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Loading spinner styles */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
      font-family: Arial, sans-serif;
    }
    #loading-screen .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #4f46e5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #loading-screen .logo-text {
      font-size: 24px;
      font-weight: bold;
      color: #4f46e5;
    }
    #loading-screen .sub-text {
      color: rgba(255,255,255,0.5);
      margin-top: 10px;
      font-size: 14px;
    }

    /* Login screen styles - WHITE background */
    .auth-shell {
      background: #ffffff !important;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .auth-card {
      background: #ffffff !important;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      border: 1px solid #e5e7eb;
    }
    .auth-card .portal-name {
      font-size: 28px;
      font-weight: bold;
      color: #1a1a2e !important;
      margin: 10px 0 5px 0;
      letter-spacing: 1px;
    }
    .auth-card .portal-slogan {
      color: #6b7280 !important;
      font-size: 16px;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      font-weight: 400;
    }
    .auth-card label {
      color: #374151 !important;
      font-weight: 500;
      display: block;
      margin-bottom: 5px;
    }
    .auth-card input {
      background: #f9fafb !important;
      color: #1a1a2e !important;
      border: 1px solid #d1d5db !important;
      border-radius: 8px;
      padding: 10px 14px;
      width: 100%;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    .auth-card input:focus {
      border-color: #4f46e5 !important;
      outline: none;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .auth-card .primary {
      background: #4f46e5 !important;
      color: white !important;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    .auth-card .primary:hover {
      background: #4338ca !important;
    }
    .auth-card .text-button {
      background: none;
      border: none;
      color: #4f46e5;
      cursor: pointer;
      font-size: 14px;
      padding: 8px 0;
      text-decoration: none;
    }
    .auth-card .text-button:hover {
      color: #4338ca;
      text-decoration: underline;
    }
    .auth-card .message {
      color: #ef4444;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }
    .auth-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Sidebar toggle button - ONLY on mobile - FIXED */
    .sidebar-toggle {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 0;
      display: none;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
      transition: all 0.3s ease;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }
    .sidebar-toggle:hover {
      background: #4338ca;
      transform: scale(1.05);
    }
    /* Three-line hamburger icon using CSS */
    .sidebar-toggle .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 22px;
      align-items: center;
      justify-content: center;
    }
    .sidebar-toggle .hamburger span {
      display: block;
      width: 100%;
      height: 3px;
      background: white;
      border-radius: 3px;
      transition: all 0.3s ease;
    }
    /* When sidebar is hidden (open state), animate to X */
    .sidebar-toggle.active .hamburger span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    .sidebar-toggle.active .hamburger span:nth-child(2) {
      opacity: 0;
    }
    .sidebar-toggle.active .hamburger span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    /* Sidebar styles */
    .sidebar {
      transition: transform 0.3s ease;
    }
    .sidebar.hidden {
      transform: translateX(-100%);
    }
    .sidebar:not(.hidden) {
      transform: translateX(0);
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .sidebar-toggle {
        display: flex !important;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        width: 280px;
        z-index: 999;
        background: #1a1a2e;
        overflow-y: auto;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        box-shadow: 2px 0 10px rgba(0,0,0,0.3);
      }
      .sidebar:not(.hidden) {
        transform: translateX(0);
      }
      .sidebar.hidden {
        transform: translateX(-100%);
      }
      .main {
        margin-left: 0 !important;
        padding: 60px 15px 15px 15px !important;
      }
      .sidebar-toggle {
        display: flex !important;
      }
      .auth-card {
        padding: 30px 20px;
        margin: 10px;
      }
      .auth-card .portal-name {
        font-size: 22px;
      }
      /* Hide the menu toggle button that was previously used */
      #menu-toggle {
        display: none !important;
      }
    }

    @media (min-width: 769px) {
      .sidebar-toggle {
        display: none !important;
      }
      .sidebar {
        transform: translateX(0) !important;
        position: relative;
        width: 260px;
        flex-shrink: 0;
      }
      .sidebar.hidden {
        transform: translateX(0) !important;
      }
      .main {
        margin-left: 0;
        flex: 1;
      }
      #app {
        display: flex !important;
      }
      #menu-toggle {
        display: none !important;
      }
    }

    /* Admin panels */
    .admin-panel {
      background: rgba(79, 70, 229, 0.05);
      border: 1px solid rgba(79, 70, 229, 0.2);
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
    }
    .admin-panel h3 {
      color: #4f46e5;
      margin-top: 0;
      font-size: 16px;
    }
    .admin-panel .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }

    /* Reset Password Modal */
    .reset-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    .reset-modal.show {
      display: flex;
    }
    .reset-modal .modal-content {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .reset-modal .modal-content h2 {
      color: #1a1a2e;
      margin-top: 0;
    }
    .reset-modal .modal-content input {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      margin: 8px 0;
    }
    .reset-modal .modal-content .toolbar {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    .reset-modal .modal-content .toolbar button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .reset-modal .modal-content .toolbar .primary {
      background: #4f46e5;
      color: white;
    }
    .reset-modal .modal-content .toolbar .secondary {
      background: #e5e7eb;
      color: #374151;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <div class="logo-text">Nous Complex</div>
    <div class="sub-text" id="loading-message">Loading attendance portal...</div>
  </div>

  <!-- Reset Password Modal -->
  <div class="reset-modal" id="reset-modal">
    <div class="modal-content">
      <h2>Reset Password</h2>
      <p style="color: #6b7280; font-size: 14px;">Enter your new password below.</p>
      <input type="password" id="reset-password" placeholder="New Password (min 8 characters)" minlength="8">
      <input type="password" id="reset-password-confirm" placeholder="Confirm New Password" minlength="8">
      <div id="reset-message" style="color: #ef4444; font-size: 14px; margin-top: 5px;"></div>
      <div class="toolbar">
        <button class="primary" id="reset-submit">Update Password</button>
        <button class="secondary" id="reset-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Sidebar Toggle Button (Mobile Only) - FIXED with CSS hamburger -->
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle menu">
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>

  <main id="auth-screen" class="auth-shell">
    <section class="auth-card">
      <div style="text-align: center;">
        <img src="nouscomplex.png" alt="Nous Complex" style="max-width: 180px; height: auto; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto;">
        <h1 class="portal-name">Nous Complex Attendance Portal</h1>
        <p class="portal-slogan">Secure Attendance System</p>
      </div>
      <form id="auth-form">
        <label>Email
          <input id="auth-email" type="email" required autocomplete="email">
        </label>
        <label>Password
          <input id="auth-password" type="password" required minlength="8" autocomplete="current-password">
        </label>
        <button id="auth-submit" class="primary" type="submit">Sign in</button>
      </form>
      <div class="auth-links">
        <button id="forgot-password-btn" class="text-button" type="button">Forgot Password?</button>
        <button id="signup-button" class="text-button" type="button">New Teacher?</button>
      </div>
      <p id="auth-message" class="message"></p>
    </section>
  </main>

  <div id="app" class="app hidden">
    <aside class="sidebar" id="sidebar">
      <div class="brand" style="display: flex; align-items: center; gap: 10px; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px;">
        <img src="nouscomplex.png" alt="Nous Complex Logo" style="height: 28px; width: 28px; object-fit: contain; flex-shrink: 0;">
        <span style="font-size: 15px; font-weight: 600; color: white; white-space: nowrap;">Nous Complex</span>
      </div>
      <nav id="nav">
        <button data-page="dashboard" class="active">Dashboard</button>
        <button data-page="attendance">Mark Attendance</button>
        <button data-page="students">Students</button>
        <button data-page="classes">Classes</button>
        <button data-page="teachers" data-admin-only>Teachers</button>
        <button data-page="reports">Reports</button>
        <button data-page="admin-tools" data-admin-only>Admin Tools</button>
      </nav>
      <div class="sidebar-bottom">
        <p id="user-name"></p>
        <span id="user-role" class="role-badge"></span>
        <button id="signout" class="text-button"> Sign Out </button>
      </div>
    </aside>
    <section class="main">
      <header>
        <button id="menu-toggle" class="mobile-only" aria-label="Open menu">☰</button>
        <div>
          <h1 id="page-title">Dashboard</h1>
          <p id="today"></p>
        </div>
      </header>
      <div id="flash" class="flash"></div>
      <div id="page-content"></div>
    </section>
  </div>

  <template id="dashboard-template">
    <div class="stats">
      <article>
        <span>Students</span>
        <strong data-stat="students">0</strong>
      </article>
      <article>
        <span>Classes</span>
        <strong data-stat="classes">0</strong>
      </article>
      <article>
        <span>Present Today</span>
        <strong data-stat="present">0</strong>
      </article>
      <article>
        <span>Attendance Today</span>
        <strong data-stat="rate">0%</strong>
      </article>
    </div>
    <section class="panel">
      <div class="panel-heading">
        <h2>Today's Attendance</h2>
        <button class="primary" data-go="attendance">Mark Attendance</button>
      </div>
      <div id="today-table"></div>
    </section>
  </template>

  <template id="attendance-template">
    <section class="panel">
      <div class="form-grid">
        <label>Date
          <input id="attendance-date" type="date">
        </label>
        <label>Class
          <select id="attendance-class">
            <option value="">Select A Class</option>
          </select>
        </label>
      </div>
      <div class="toolbar">
        <button id="load-roster" class="secondary">Load Students</button>
        <button id="save-attendance" class="primary" disabled>Save Attendance</button>
      </div>
      <div id="roster"></div>
    </section>
  </template>

  <template id="students-template">
    <section class="panel">
      <div class="panel-heading">
        <h2>Student Register</h2>
        <button class="primary" id="new-student" data-admin-only>Add Student</button>
      </div>
      <div class="form-grid" style="grid-template-columns:1fr">
        <label>Filter By Class
          <select id="students-class-filter"></select>
        </label>
      </div>
      <div id="student-form" class="inline-form hidden"></div>
      <div id="students-table"></div>
    </section>
  </template>

  <template id="classes-template">
    <section class="panel">
      <div class="panel-heading">
        <h2>Classes</h2>
        <button class="primary" id="new-class" data-admin-only>Add class</button>
      </div>
      <div id="class-form" class="inline-form hidden"></div>
      <div id="classes-table"></div>
    </section>
  </template>

  <template id="teachers-template">
    <section class="panel">
      <div class="panel-heading">
        <h2>Teacher Registration</h2>
      </div>
      <p class="muted">A Teacher Creates An Account First. Select Account Below To Activate Their Staff Profile.</p>
      <div id="teacher-form" class="inline-form"></div>
      <div id="teachers-table"></div>
    </section>
  </template>

  <template id="reports-template">
    <section class="panel">
      <div class="form-grid report-filters">
        <label>From
          <input id="report-from" type="date">
        </label>
        <label>To
          <input id="report-to" type="date">
        </label>
        <label>Class
          <select id="report-class">
            <option value="">All Available Classes</option>
          </select>
        </label>
        <label>Student
          <select id="report-student">
            <option value="">All Students</option>
          </select>
        </label>
      </div>
      <div class="form-grid" style="grid-template-columns:1fr">
        <label>Show
          <select id="report-view">
            <option value="summary">Summary By Student Only</option>
            <option value="detail">Detailed Records Only</option>
            <option value="both">Summary + Detailed Records</option>
          </select>
        </label>
      </div>
      <div class="toolbar">
        <button id="run-report" class="secondary">Run Report</button>
        <button id="excel-export-both" class="primary export-only">Download Excel (Both)</button>
        <button id="excel-export-summary" class="secondary export-only">Download Excel (Summary)</button>
        <button id="excel-export-detail" class="secondary export-only">Download Excel (Detailed)</button>
        <button id="pdf-export" class="secondary export-only">Save PDF</button>
      </div>
      <p id="export-restricted-note" class="muted hidden">Report Downloads Have Been Disabled For Your Account By The Administrator.</p>
      <div id="report-summary" class="stats compact"></div>
      <div id="summary-section">
        <div class="panel-heading" style="margin-top:24px">
          <h2>Summary By Student</h2>
        </div>
        <div id="student-summary-table"></div>
      </div>
      <div id="detail-section">
        <div class="panel-heading" style="margin-top:24px">
          <h2>Detailed Attendance Records</h2>
        </div>
        <div id="report-table"></div>
      </div>
    </section>
  </template>

  <template id="admin-tools-template">
    <section class="panel">
      <div class="panel-heading">
        <h2>Admin Tools</h2>
      </div>
      <div class="admin-panel">
        <h3>Clear Attendance Data</h3>
        <p class="muted">Delete attendance records for a specific date range. This action cannot be undone.</p>
        <div class="form-grid">
          <label>From Date
            <input id="clear-from" type="date">
          </label>
          <label>To Date
            <input id="clear-to" type="date">
          </label>
          <label>Class
            <select id="clear-class">
              <option value="">All Classes</option>
            </select>
          </label>
          <label>Student
            <select id="clear-student">
              <option value="">All Students</option>
            </select>
          </label>
        </div>
        <button id="clear-attendance" class="danger" style="background:#ef4444;color:white;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;margin-top:10px;">Clear Attendance Records</button>
        <div id="clear-result" style="margin-top:10px;"></div>
      </div>
    </section>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
